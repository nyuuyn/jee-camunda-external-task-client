services:

  postgres:
    image: postgres:16
    container_name: notes-postgres
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates camundadb on first start alongside notesdb
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notesdb && pg_isready -U notes -d camundadb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  camunda:
    image: camunda/camunda-bpm-platform:7.21.0
    container_name: notes-camunda
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/camundadb
      DB_USERNAME: notes
      DB_PASSWORD: notes
      # Increase wait time for DB schema creation on first boot
      WAIT_FOR: postgres:5432
      WAIT_FOR_TIMEOUT: 60
    ports:
      - "8090:8080"   # Camunda web app + REST API  (http://localhost:8090/camunda)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  wildfly:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: notes-wildfly
    ports:
      - "8080:8080"   # Application  (http://localhost:8080/notes/api/notes)
      - "9990:9990"   # Management console
    depends_on:
      postgres:
        condition: service_healthy
      camunda:
        condition: service_healthy

volumes:
  postgres-data: